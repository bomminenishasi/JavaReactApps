server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://frontend:3000"
            allowedMethods: ["GET","POST","PUT","DELETE","OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
      routes:
        # GraphQL BFF
        - id: graphql-bff
          uri: ${GRAPHQL_BFF_URL:http://graphql-bff:8081}
          predicates:
            - Path=/graphql/**, /graphiql/**
          filters:
            - RemoveRequestHeader=Cookie

        # User Service (public — auth handled in service)
        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8082}
          predicates:
            - Path=/api/users/**, /api/auth/**

        # Product Service (public)
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://product-service:8083}
          predicates:
            - Path=/api/products/**, /api/categories/**

        # Order Service
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://order-service:8084}
          predicates:
            - Path=/api/orders/**
          filters:
            - AuthenticationFilter

        # Cart Service
        - id: cart-service
          uri: ${CART_SERVICE_URL:http://cart-service:8085}
          predicates:
            - Path=/api/cart/**
          filters:
            - AuthenticationFilter

        # Payment Service
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://payment-service:8086}
          predicates:
            - Path=/api/payments/**
          filters:
            - AuthenticationFilter

        # Inventory Service
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://inventory-service:8087}
          predicates:
            - Path=/api/inventory/**

# JWT
jwt:
  secret: ${JWT_SECRET:retail-jwt-secret-key-shopease-2024-secure-256bits}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.shopease: DEBUG
